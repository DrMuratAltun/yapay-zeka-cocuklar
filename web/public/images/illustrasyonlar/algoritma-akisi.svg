<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" role="img" aria-label="Algoritma akış şeması">
  <defs>
    <linearGradient id="bg-algo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfccb"/>
      <stop offset="1" stop-color="#fef9c3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="500" height="300" rx="16" fill="url(#bg-algo)"/>
  <text x="250" y="28" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="800" fill="#1e293b">Algoritma: Adım Adım Çözüm</text>

  <!-- Start (oval) -->
  <g>
    <ellipse cx="90" cy="80" rx="55" ry="22" fill="#10b981" stroke="#047857" stroke-width="2"/>
    <text x="90" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#ffffff">Başla</text>
  </g>

  <!-- Ok 1 -->
  <path d="M 90 102 L 90 125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Input (parallelogram) -->
  <g>
    <polygon points="50,135 180,135 160,175 30,175" fill="#fef08a" stroke="#854d0e" stroke-width="2"/>
    <text x="95" y="160" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Veri oku</text>
  </g>

  <!-- Ok 2 -->
  <path d="M 90 175 L 90 200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Process (rectangle) -->
  <g>
    <rect x="30" y="200" width="130" height="45" rx="6" fill="#93c5fd" stroke="#1e40af" stroke-width="2"/>
    <text x="95" y="220" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">İşle / hesapla</text>
    <text x="95" y="234" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">(kuralları uygula)</text>
  </g>

  <!-- Ok 3 (sağa) -->
  <path d="M 160 222 L 225 222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision (diamond) -->
  <g>
    <polygon points="290,180 360,222 290,264 220,222" fill="#fca5a5" stroke="#991b1b" stroke-width="2"/>
    <text x="290" y="218" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Karar?</text>
    <text x="290" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">(koşul)</text>
  </g>

  <!-- Evet okuyla dal -->
  <path d="M 360 222 L 415 222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="388" y="216" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#059669">Evet</text>

  <!-- Output (parallelogram) -->
  <g>
    <polygon points="390,200 470,200 460,245 380,245" fill="#d8b4fe" stroke="#6b21a8" stroke-width="2"/>
    <text x="425" y="226" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Sonuç yaz</text>
  </g>

  <!-- Ok hayır (geri) -->
  <path d="M 290 264 L 290 285 L 95 285 L 95 245" stroke="#475569" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="190" y="280" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#b91c1c">Hayır (tekrar dene)</text>

</svg>
