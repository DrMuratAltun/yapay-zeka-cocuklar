<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Sohbet robotu ve kullanıcı konuşması">
  <defs>
    <linearGradient id="bg-chat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg-chat)"/>

  <!-- Telefon ekranı -->
  <rect x="120" y="30" width="160" height="240" rx="22" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
  <rect x="128" y="50" width="144" height="200" rx="4" fill="#f1f5f9"/>

  <!-- Ekran başlık -->
  <rect x="128" y="50" width="144" height="22" rx="4" fill="#0ea5e9"/>
  <text x="200" y="65" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#ffffff">Zeki Asistan 🤖</text>

  <!-- Kullanıcı balonu (sağ) -->
  <g>
    <rect x="175" y="82" width="90" height="28" rx="12" fill="#0ea5e9"/>
    <text x="220" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Merhaba!</text>
  </g>

  <!-- YZ balonu (sol) -->
  <g>
    <rect x="135" y="118" width="110" height="44" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="190" y="134" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Selam! Nasıl</text>
    <text x="190" y="146" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">yardımcı olabilirim?</text>
  </g>

  <!-- Kullanıcı balonu 2 -->
  <g>
    <rect x="150" y="170" width="115" height="28" rx="12" fill="#0ea5e9"/>
    <text x="207" y="188" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">YZ nedir anlat?</text>
  </g>

  <!-- YZ yazıyor... göstergesi -->
  <g>
    <rect x="135" y="206" width="60" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="150" cy="218" r="3" fill="#94a3b8"/>
    <circle cx="162" cy="218" r="3" fill="#94a3b8"/>
    <circle cx="174" cy="218" r="3" fill="#94a3b8"/>
  </g>

  <!-- Robot karakter (sol) -->
  <g transform="translate(25 110)">
    <!-- Body -->
    <rect x="10" y="40" width="60" height="65" rx="12" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <!-- Head -->
    <rect x="15" y="5" width="50" height="45" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="28" cy="25" r="5" fill="#0ea5e9"/>
    <circle cx="52" cy="25" r="5" fill="#0ea5e9"/>
    <circle cx="29" cy="23" r="1.5" fill="#ffffff"/>
    <circle cx="53" cy="23" r="1.5" fill="#ffffff"/>
    <!-- Mouth -->
    <rect x="30" y="35" width="20" height="5" rx="2" fill="#475569"/>
    <!-- Antenna -->
    <line x1="40" y1="5" x2="40" y2="-8" stroke="#475569" stroke-width="2"/>
    <circle cx="40" cy="-10" r="3" fill="#fcd34d"/>
    <!-- Arm -->
    <rect x="70" y="55" width="8" height="30" rx="4" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <!-- Chest panel -->
    <rect x="22" y="60" width="36" height="18" rx="3" fill="#0ea5e9" opacity="0.3"/>
    <circle cx="30" cy="69" r="2" fill="#10b981"/>
    <circle cx="40" cy="69" r="2" fill="#fcd34d"/>
    <circle cx="50" cy="69" r="2" fill="#ef4444"/>
  </g>

  <!-- Kullanıcı karakter (sağ) -->
  <g transform="translate(295 130)">
    <!-- Head -->
    <circle cx="30" cy="20" r="20" fill="#fdba74"/>
    <!-- Hair -->
    <path d="M 12 18 Q 30 -5 48 18 Q 48 8 30 6 Q 12 8 12 18 Z" fill="#78350f"/>
    <!-- Eyes -->
    <circle cx="23" cy="20" r="2" fill="#0f172a"/>
    <circle cx="37" cy="20" r="2" fill="#0f172a"/>
    <!-- Smile -->
    <path d="M 22 28 Q 30 34 38 28" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M 10 45 L 50 45 L 55 90 L 5 90 Z" fill="#a78bfa"/>
  </g>

  <!-- Başlık -->
  <text x="200" y="290" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b">Üretken YZ ile konuşmak: Doğal dil anlayışı</text>
</svg>
