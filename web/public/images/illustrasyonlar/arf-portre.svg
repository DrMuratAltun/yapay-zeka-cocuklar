<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Cahit Arf stilize portre">
  <defs>
    <linearGradient id="arf-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="arf-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="200" height="240" rx="18" fill="url(#arf-bg)"/>

  <!-- Dekoratif matematik sembolleri -->
  <g fill="#ffffff" opacity="0.1" font-family="serif" font-size="14" font-style="italic">
    <text x="15" y="25">&#8747;</text>
    <text x="170" y="30">&#8721;</text>
    <text x="20" y="225">&#960;</text>
    <text x="170" y="230">&#8734;</text>
    <text x="25" y="60">x&#178;</text>
    <text x="160" y="65">f(x)</text>
  </g>

  <!-- Vücut -->
  <path d="M 48 200 L 58 168 Q 100 158 142 168 L 152 200 L 152 240 L 48 240 Z" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <!-- Yaka -->
  <path d="M 72 173 L 95 195 L 100 173 L 105 195 L 128 173 L 128 180 L 105 200 L 100 180 L 95 200 L 72 180 Z" fill="#f1f5f9"/>
  <!-- Kravat -->
  <path d="M 95 200 L 100 222 L 105 200 Z" fill="#0369a1"/>

  <!-- Boyun -->
  <rect x="88" y="152" width="24" height="20" fill="url(#arf-skin)"/>

  <!-- Baş -->
  <ellipse cx="100" cy="112" rx="38" ry="46" fill="url(#arf-skin)" stroke="#92400e" stroke-width="0.8"/>

  <!-- Saç (kısa, gri) -->
  <path d="M 62 95 Q 68 70 100 68 Q 132 70 138 95 Q 138 82 130 78 Q 130 70 100 70 Q 70 70 70 78 Q 62 82 62 95 Z" fill="#6b7280"/>
  <!-- Hafif kel bölgesi -->
  <ellipse cx="100" cy="82" rx="22" ry="10" fill="url(#arf-skin)" stroke="#92400e" stroke-width="0.4"/>

  <!-- Kalın kaşlar -->
  <path d="M 78 102 Q 88 99 94 103" fill="none" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 106 103 Q 112 99 122 102" fill="none" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Gözlük çerçevesi -->
  <g fill="none" stroke="#1f2937" stroke-width="2">
    <circle cx="86" cy="115" r="10"/>
    <circle cx="114" cy="115" r="10"/>
    <line x1="96" y1="115" x2="104" y2="115"/>
    <line x1="76" y1="115" x2="70" y2="113"/>
    <line x1="124" y1="115" x2="130" y2="113"/>
  </g>
  <!-- Gözler -->
  <circle cx="86" cy="115" r="2.5" fill="#1f2937"/>
  <circle cx="114" cy="115" r="2.5" fill="#1f2937"/>
  <circle cx="87" cy="114" r="0.7" fill="#ffffff"/>
  <circle cx="115" cy="114" r="0.7" fill="#ffffff"/>

  <!-- Burun -->
  <path d="M 100 120 Q 97 130 99 136 L 103 136 Q 105 132 100 120" fill="none" stroke="#92400e" stroke-width="1"/>
  <!-- Bıyık hafif -->
  <path d="M 92 142 Q 100 140 108 142" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
  <!-- Ağız -->
  <path d="M 92 148 Q 100 152 108 148" fill="none" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>

  <!-- İsim etiketi -->
  <rect x="15" y="200" width="80" height="20" rx="10" fill="#ffffff" fill-opacity="0.12"/>
  <text x="55" y="214" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#ffffff">Cahit Arf</text>
</svg>
