<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img" aria-label="Yapay Zeka, Makine Öğrenmesi ve Derin Öğrenme ilişkisi - Türkçe Venn diyagramı">
  <defs>
    <radialGradient id="yz-grad" cx="50%" cy="40%">
      <stop offset="0" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </radialGradient>
    <radialGradient id="ml-grad" cx="50%" cy="40%">
      <stop offset="0" stop-color="#ddd6fe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </radialGradient>
    <radialGradient id="dl-grad" cx="50%" cy="40%">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#10b981"/>
    </radialGradient>
  </defs>
  <rect width="400" height="340" rx="16" fill="#f8fafc"/>
  <text x="200" y="28" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="800" fill="#0f172a">YZ, Makine Öğrenmesi ve Derin Öğrenme</text>

  <!-- YZ (en büyük daire) -->
  <circle cx="200" cy="175" r="135" fill="url(#yz-grad)" fill-opacity="0.85" stroke="#0369a1" stroke-width="2"/>
  <text x="200" y="65" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="800" fill="#ffffff">YAPAY ZEKA</text>
  <text x="200" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff" font-style="italic">Zeki davranış gösteren sistemler</text>
  <text x="300" y="130" font-family="system-ui" font-size="9" fill="#0c4a6e">• Kurallar</text>
  <text x="300" y="143" font-family="system-ui" font-size="9" fill="#0c4a6e">• Mantık</text>
  <text x="300" y="156" font-family="system-ui" font-size="9" fill="#0c4a6e">• Planlama</text>

  <!-- ML (orta daire) -->
  <circle cx="200" cy="195" r="95" fill="url(#ml-grad)" fill-opacity="0.88" stroke="#6b21a8" stroke-width="2"/>
  <text x="200" y="130" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="800" fill="#ffffff">MAKİNE ÖĞRENMESİ</text>
  <text x="200" y="146" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff" font-style="italic">Veriden öğrenen modeller</text>

  <!-- DL (en küçük daire) -->
  <circle cx="200" cy="215" r="52" fill="url(#dl-grad)" fill-opacity="0.92" stroke="#047857" stroke-width="2"/>
  <text x="200" y="200" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="800" fill="#ffffff">DERİN</text>
  <text x="200" y="215" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="800" fill="#ffffff">ÖĞRENME</text>
  <text x="200" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff" font-style="italic">Çok katmanlı</text>
  <text x="200" y="242" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff" font-style="italic">sinir ağları</text>

  <!-- Örnekler listesi -->
  <g font-family="system-ui" font-size="9" fill="#334155">
    <text x="50" y="250">• ELIZA</text>
    <text x="50" y="263">• Karar ağacı</text>
    <text x="50" y="276">• Spam filtresi</text>
    <text x="50" y="289">• GPT</text>
    <text x="50" y="302">• Görüntü tanıma</text>
  </g>
  <g stroke="#64748b" stroke-width="0.8" fill="none">
    <line x1="80" y1="248" x2="75" y2="160"/>
    <line x1="85" y1="261" x2="120" y2="180"/>
    <line x1="92" y1="274" x2="140" y2="195"/>
    <line x1="72" y1="287" x2="170" y2="215"/>
    <line x1="95" y1="300" x2="180" y2="225"/>
  </g>

  <!-- Sağ tarafta yıl etiketleri -->
  <g font-family="system-ui" font-size="9" fill="#64748b">
    <text x="340" y="80" text-anchor="end">1956'dan beri</text>
    <text x="340" y="145" text-anchor="end">1980'lerden beri</text>
    <text x="340" y="215" text-anchor="end">2010'dan beri</text>
  </g>

  <!-- Legend -->
  <text x="200" y="325" text-anchor="middle" font-family="system-ui" font-size="9" fill="#64748b" font-style="italic">
    Her biri bir öncekinin alt kümesidir. En güçlü kategori en içtedir.
  </text>
</svg>
